name: CI & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build-image.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable corepack
        run: |
          corepack enable
          corepack prepare yarn@stable --activate

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build (turbo)
        run: yarn build

      - name: Build Docker image
        id: build-image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/open-swe-agent:latest -f apps/open-swe/Dockerfile .
          echo "image=ghcr.io/${{ github.repository }}/open-swe-agent:latest" >> $GITHUB_OUTPUT

  publish-and-deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log into GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        run: |
          docker tag ghcr.io/${{ github.repository }}/open-swe-agent:latest ghcr.io/${{ github.repository }}/open-swe-agent:latest
          docker push ghcr.io/${{ github.repository }}/open-swe-agent:latest

      - name: Install flyctl
        uses: superfly/flyctl-action@v1
        with:
          version: latest

      - name: Deploy to Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy --app open-swe-agent --image ghcr.io/${{ github.repository }}/open-swe-agent:latest --remote-only
